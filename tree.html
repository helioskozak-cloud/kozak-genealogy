<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Family Tree — Kozak Genealogy</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#f1f5f9;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#hdr{flex-shrink:0;height:46px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;gap:0;padding:0 14px}
#hdr a{color:#94a3b8;font-size:.78rem;font-weight:500;text-decoration:none;padding:6px 10px;border-radius:6px;transition:.15s;white-space:nowrap}
#hdr a:hover{background:#334155;color:#f1f5f9}
#hdr .title{font-size:.85rem;font-weight:600;color:#e2e8f0;margin:0 10px}
#hdr .sep{color:#475569;margin:0 2px}
#hdr .hint{font-size:.72rem;color:#64748b;margin-left:auto;display:flex;gap:14px}
#hdr .hint span{display:flex;align-items:center;gap:4px}
#tree-wrap{flex:1;position:relative;overflow:hidden}
#tree-svg{display:block;width:100%;height:100%;cursor:grab}
#tree-svg:active{cursor:grabbing}
/* legend */
#legend{position:absolute;bottom:14px;left:14px;background:rgba(15,23,42,.88);border:1px solid #334155;border-radius:8px;padding:10px 13px;display:flex;flex-wrap:wrap;gap:8px 16px;max-width:480px}
.li{display:flex;align-items:center;gap:5px;font-size:.68rem;color:#94a3b8;font-weight:500}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}
#legend .link-item{display:flex;align-items:center;gap:5px;font-size:.68rem;color:#94a3b8}
/* detail panel */
#panel{position:absolute;top:12px;right:12px;width:220px;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:14px;font-size:.78rem;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#panel .pname{font-weight:700;font-size:.9rem;color:#f1f5f9;margin-bottom:8px;line-height:1.3}
#panel .prow{display:flex;gap:6px;margin-bottom:3px;line-height:1.4;color:#cbd5e1}
#panel .plbl{font-weight:600;color:#94a3b8;min-width:48px;flex-shrink:0;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em}
#panel .pclose{position:absolute;top:8px;right:10px;cursor:pointer;color:#64748b;font-size:1rem}
#panel .pclose:hover{color:#f1f5f9}
/* gen labels */
.gen-label{font-size:11px;fill:#475569;font-family:system-ui,sans-serif;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
/* fit button */
#fit-btn{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #334155;color:#94a3b8;font-size:.72rem;padding:5px 12px;border-radius:6px;cursor:pointer;z-index:10}
#fit-btn:hover{background:#334155;color:#f1f5f9}
</style>
</head>
<body>
<div id="hdr">
  <a href="index.html">&#8592; Research Site</a>
  <span class="sep">|</span>
  <span class="title">Kozak / Relihan Family Tree</span>
  <div class="hint">
    <span>scroll: zoom</span>
    <span>drag: pan</span>
    <span>click: focus</span>
    <span>esc / click bg: reset</span>
  </div>
</div>
<div id="tree-wrap">
  <svg id="tree-svg"></svg>
  <button id="fit-btn">Fit All</button>
  <div id="legend">
    <div class="li"><div class="ld" style="background:#1d4ed8"></div>Dooley Branch</div>
    <div class="li"><div class="ld" style="background:#15803d"></div>Kozak</div>
    <div class="li"><div class="ld" style="background:#7e22ce"></div>Shomsky</div>
    <div class="li"><div class="ld" style="background:#3730a3"></div>O'Connell Branch</div>
    <div class="li"><div class="ld" style="background:#c2410c"></div>McNamara Branch</div>
    <div class="li"><div class="ld" style="background:#64748b"></div>Unknown</div>
    <div class="link-item"><svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#94a3b8" stroke-width="1.5"/></svg>Parent</div>
    <div class="link-item"><svg width="24" height="10"><line x1="0" y1="5" x2="24" y2="5" stroke="#64748b" stroke-width="1.2" stroke-dasharray="4,3"/></svg>Spouse</div>
  </div>
  <div id="panel">
    <div class="pclose" id="pclose">&#x2715;</div>
    <div class="pname" id="pname"></div>
    <div id="pbody"></div>
  </div>
</div>

const links = [
  // Dooley G5 marriages
  {s:'jjr-d',t:'ann-d',type:'spouse'},{s:'m-sh',t:'mary-d',type:'spouse'},
  // Kozak G4 marriage
  {s:'jj-koz',t:'helen',type:'spouse'},
  // G5→G4 parent
  {s:'jjr-d',t:'tp',type:'parent'},{s:'jjr-d',t:'sen',type:'parent'},{s:'jjr-d',t:'edw',type:'parent'},
  {s:'jjr-d',t:'ann',type:'parent'},{s:'jjr-d',t:'mar',type:'parent'},
  {s:'m-sh',t:'dor',type:'parent'},
  // G4→G3 parent (Kozak)
  {s:'jj-koz',t:'mark',type:'parent'},

  {s:'tp',t:'dor',type:'spouse'},{s:'ann',t:'fl',type:'spouse'},{s:'mar',t:'jm2',type:'spouse'},

  {s:'tp',t:'nancy',type:'parent'},{s:'tp',t:'tommy',type:'parent'},{s:'tp',t:'rob',type:'parent'},{s:'tp',t:'betsy',type:'parent'},

  // G3 marriage + G1 children

  {s:'jt-r',t:'jm-r',type:'parent'},{s:'jt-r',t:'jr-r',type:'parent'},
  {s:'jm-r',t:'jjr-oc',type:'parent'},{s:'jm-r',t:'don-r',type:'parent'},{s:'jm-r',t:'jos-oc',type:'parent'},

  {s:'jr-r',t:'steven',type:'parent'},{s:'jr-r',t:'rob-oc',type:'parent'},{s:'jr-r',t:'jane',type:'parent'},{s:'jr-r',t:'scott',type:'parent'},
  // McNamara
  {s:'jjr-mn',t:'mabel',type:'spouse'},

  {s:'sally',t:'jd-k',type:'spouse'},{s:'nancy-mn',t:'curt',type:'spouse'},
  {s:'sally',t:'peter-k',type:'parent'},{s:'sally',t:'sean-k',type:'parent'},{s:'sally',t:'sarah-k',type:'parent'},
  {s:'sally',t:'mark-k',type:'parent'},{s:'sally',t:'mara-km',type:'parent'},
  {s:'john-az',t:'john-p',type:'parent'},{s:'john-az',t:'pat-r',type:'parent'},{s:'john-az',t:'alisha',type:'parent'},
];

(function buildTree(){
  const wrap = document.getElementById('tree-wrap');
  const W = wrap.clientWidth;
  const H = wrap.clientHeight;
  const SLOT = 48;
  const XOFF = 60;  // leave room for gen labels

  const svg = d3.select('#tree-svg').attr('viewBox', `0 0 ${W} ${H}`);
  const g = svg.append('g').attr('id','main-g');

  // Initial fit: compute full tree extent
  const maxBx = d3.max(nodes, n => n.bx);
  const treeW = XOFF + maxBx * SLOT + 40;
  const treeH = ROW_Y[1] + 80;
  const scale0 = Math.min(W / treeW, H / treeH) * 0.9;
  const tx0 = (W - treeW * scale0) / 2;
  const ty0 = (H - treeH * scale0) / 2;
  const zoomBehavior = d3.zoom().scaleExtent([0.2, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoomBehavior);
  svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(tx0, ty0).scale(scale0));

  svg.on('click.reset', function(e){
    if(e.target === this || e.target.classList.contains('gen-bg')) resetHighlight();
  });

  document.getElementById('fit-btn').addEventListener('click', () => {
    svg.transition().duration(500).call(zoomBehavior.transform,
      d3.zoomIdentity.translate(tx0, ty0).scale(scale0));
    resetHighlight();
  });

  document.addEventListener('keydown', e => { if(e.key==='Escape') resetHighlight(); });

  // Generation background bands
  const bands = [
    {row:5, color:'rgba(255,255,255,0.02)'},
    {row:4, color:'rgba(255,255,255,0.04)'},
    {row:3, color:'rgba(255,255,255,0.02)'},
    {row:1, color:'rgba(255,255,255,0.04)'},
  ];
  const bandH = 90;
  bands.forEach(b => {
    g.append('rect').attr('class','gen-bg')
      .attr('x', 0).attr('y', ROW_Y[b.row] - bandH/2)
      .attr('width', treeW + 100).attr('height', bandH)
      .attr('fill', b.color).attr('rx', 6);
  });

  // Generation labels
  GEN_LABELS.forEach(gl => {
    g.append('text').attr('class','gen-label')
      .attr('x', 4).attr('y', ROW_Y[gl.row] + 4)
      .attr('fill','#475569')
      .text(gl.label);
  });

  // Prep positions
  nodes.forEach(n => {
    n.x = XOFF + n.bx * SLOT;
    n.fy = ROW_Y[n.row];
    n.y = n.fy;
  });

  const nodeById = {};
  nodes.forEach(n => nodeById[n.id] = n);

  const linkData = links.map(l => ({
    source: nodeById[l.s], target: nodeById[l.t], type: l.type
  }));

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(linkData).id(d=>d.id).distance(d=>d.type==='spouse'?30:55).strength(0.12))
    .force('collide', d3.forceCollide(24))
    .force('x', d3.forceX(n => XOFF + n.bx * SLOT).strength(0.45))
    .stop();

  for(let i=0; i<400; i++) sim.tick();

  // Links
  const linkSel = g.append('g').attr('id','links').selectAll('line').data(linkData).join('line')
    .attr('stroke', d => d.type==='parent' ? '#64748b' : '#334155')
    .attr('stroke-width', d => d.type==='parent' ? 1.5 : 1)
    .attr('stroke-dasharray', d => d.type==='spouse' ? '5,3' : null)
    .attr('opacity', 0.7)
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.fy)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.fy);

  // Nodes
  const R = 11, R_FOCUS = 22, R_ADJ = 15, R_DIM = 7;

  const nodeSel = g.append('g').attr('id','nodes').selectAll('g').data(nodes).join('g')
    .attr('transform', d => `translate(${d.x},${d.fy})`)
    .style('cursor','pointer')
    .on('click', (e, d) => { e.stopPropagation(); focusNode(d); });

  nodeSel.append('circle')
    .attr('r', R)
    .attr('fill', d => BRANCH_FILL[d.branch])
    .attr('stroke', d => BRANCH_STROKE[d.branch])
    .attr('stroke-width', 2)
    .style('transition','r .2s, opacity .2s, stroke-width .2s');

  // Special ring for Grant
  nodeSel.filter(d => d.id === 'grant')
    .append('circle')
    .attr('r', R + 5)
    .attr('fill','none')
    .attr('stroke','#fbbf24')
    .attr('stroke-width',1.5)
    .attr('stroke-dasharray','3,2')
    .attr('opacity',0.8);

  nodeSel.append('text')
    .attr('y', R + 11)
    .attr('text-anchor','middle')
    .attr('font-size','8.5px')
    .attr('font-family','system-ui,sans-serif')
    .attr('fill','#e2e8f0')
    .attr('paint-order','stroke')
    .attr('stroke','#0f172a')
    .attr('stroke-width','3px')
    .text(d => {
      const nm = d.name.replace(' Relihan',' R.').replace(' Kozak',' K.');
      return nm.length > 22 ? nm.slice(0,21)+'…' : nm;
    });

  function focusNode(d){
    const adj = new Set();
    linkData.forEach(l=>{
      if(l.source.id===d.id) adj.add(l.target.id);
      if(l.target.id===d.id) adj.add(l.source.id);
    });
    nodeSel.select('circle:first-of-type')
      .attr('r', n => n.id===d.id ? R_FOCUS : adj.has(n.id) ? R_ADJ : R_DIM)
      .attr('stroke-width', n => n.id===d.id ? 3 : 2)
      .attr('opacity', n => n.id===d.id || adj.has(n.id) ? 1 : 0.2);
    nodeSel.select('text')
      .attr('font-size', n => n.id===d.id ? '10.5px' : adj.has(n.id) ? '9px' : '7px')
      .attr('opacity', n => n.id===d.id || adj.has(n.id) ? 1 : 0.2)
      .attr('y', n => (n.id===d.id ? R_FOCUS : n.id && adj.has(n.id) ? R_ADJ : R_DIM) + 11);
    linkSel
      .attr('opacity', l => l.source.id===d.id||l.target.id===d.id ? 1 : 0.06)
      .attr('stroke-width', l => l.source.id===d.id||l.target.id===d.id ? 2.5 : 1);
    // detail panel
    const panel = document.getElementById('panel');
    document.getElementById('pname').textContent = d.name;
    const branchLabel = {dooley:'Dooley Branch',kozak:'Kozak',shomsky:'Shomsky',oconnell:"O'Connell Branch",mcnamara:'McNamara Branch',unknown:'Unknown / Unresolved'}[d.branch];
    const genLabel = {5:'Great-grandparent',4:'Grandparent',3:"Parent's generation",1:"Grant's generation"}[d.row];
    document.getElementById('pbody').innerHTML =
      `<div class="prow"><span class="plbl">Branch</span>${branchLabel}</div>` +
      `<div class="prow"><span class="plbl">Gen</span>${genLabel}</div>` +
      (d.note ? `<div class="prow"><span class="plbl">Notes</span>${d.note}</div>` : '') +
      `<div class="prow" style="margin-top:7px;color:#475569;font-size:.7rem">${adj.size} direct connection${adj.size!==1?'s':''}</div>`;
    panel.style.display = 'block';
  }

  function resetHighlight(){
    nodeSel.select('circle:first-of-type').attr('r', R).attr('stroke-width', 2).attr('opacity', 1);
    nodeSel.select('text').attr('font-size','8.5px').attr('opacity',1).attr('y', R+11);
    linkSel.attr('opacity',0.7).attr('stroke-width', d=>d.type==='parent'?1.5:1);
    document.getElementById('panel').style.display='none';
  }

  document.getElementById('pclose').onclick = resetHighlight;
})();
</script>
</body>
</html>
