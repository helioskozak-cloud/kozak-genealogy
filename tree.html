  {id:'mark-k',  name:'Mark J. Kelly',           note:'Child of Sally + John Kelly',                    branch:'mcnamara',row:3, bx:25},
  {id:'mara-km', name:'Mara Kelly Marsh',        note:'Child of Sally + John Kelly',                    branch:'mcnamara',row:3, bx:26},
  {id:'john-p',  name:'John P. Relihan, Esq.',   note:'Risk management executive · Thousand Oaks CA',  branch:'mcnamara',row:3, bx:27},
  {id:'pat-r',   name:'Patrick Relihan',         note:'Solomon & Relihan · Phoenix AZ · likely active 2026', branch:'mcnamara',row:3, bx:28},
  {id:'alisha',  name:'Alisha Fahrendorf',        note:'Partner, Snell & Wilmer · Phoenix AZ',         branch:'mcnamara',row:3, bx:29},
];

// ── LINKS ─────────────────────────────────────────────────────────────────
const links = [
  // Dooley G5 spouses
  {s:'jjr-d',   t:'ann-d',    type:'spouse'},
  {s:'m-sh',    t:'mary-d',   type:'spouse'},
  // G5 → G4
  {s:'jjr-d',   t:'tp',       type:'parent'},
  {s:'jjr-d',   t:'sen',      type:'parent'},
  {s:'jjr-d',   t:'edw',      type:'parent'},
  {s:'jjr-d',   t:'ann',      type:'parent'},
  {s:'jjr-d',   t:'mar',      type:'parent'},
  {s:'m-sh',    t:'dor',      type:'parent'},
  // G4 spouses
  {s:'tp',      t:'dor',      type:'spouse'},
  {s:'ann',     t:'fl',       type:'spouse'},
  {s:'mar',     t:'jm2',      type:'spouse'},
  {s:'jj-koz',  t:'helen',    type:'spouse'},
  // G4 → G3
  {s:'tp',      t:'nancy',    type:'parent'},
  {s:'tp',      t:'tommy',    type:'parent'},
  {s:'tp',      t:'rob',      type:'parent'},
  {s:'tp',      t:'betsy',    type:'parent'},
  {s:'ann',     t:'fl3',      type:'parent'},
  {s:'ann',     t:'matt',     type:'parent'},
  {s:'ann',     t:'carol',    type:'parent'},
  {s:'mar',     t:'ter',      type:'parent'},
  {s:'mar',     t:'den',      type:'parent'},
  {s:'jj-koz',  t:'mark',     type:'parent'},
  // G3 spouse + G1
  {s:'nancy',   t:'mark',     type:'spouse'},
  {s:'nancy',   t:'grant',    type:'parent'},
  {s:'nancy',   t:'hilary',   type:'parent'},
  // O'Connell
  {s:'jt-r',    t:'mary-oc',  type:'spouse'},
  {s:'jt-r',    t:'jm-r',     type:'parent'},
  {s:'jt-r',    t:'jr-r',     type:'parent'},
  {s:'jm-r',    t:'jjr-oc',   type:'parent'},
  {s:'jm-r',    t:'don-r',    type:'parent'},
  {s:'jm-r',    t:'jos-oc',   type:'parent'},
  {s:'jm-r',    t:'kathy',    type:'parent'},
  {s:'jm-r',    t:'eileen',   type:'parent'},
  {s:'jr-r',    t:'steven',   type:'parent'},
  {s:'jr-r',    t:'rob-oc',   type:'parent'},
  {s:'jr-r',    t:'jane',     type:'parent'},
  {s:'jr-r',    t:'scott',    type:'parent'},
  // McNamara
  {s:'jjr-mn',  t:'mabel',    type:'spouse'},
  {s:'jjr-mn',  t:'joan',     type:'parent'},
  {s:'jjr-mn',  t:'sally',    type:'parent'},
  {s:'jjr-mn',  t:'nancy-mn', type:'parent'},
  {s:'jjr-mn',  t:'john-az',  type:'parent'},
  {s:'sally',   t:'jd-k',     type:'spouse'},
  {s:'nancy-mn',t:'curt',     type:'spouse'},
  {s:'sally',   t:'peter-k',  type:'parent'},
  {s:'sally',   t:'sean-k',   type:'parent'},
  {s:'sally',   t:'sarah-k',  type:'parent'},
  {s:'sally',   t:'mark-k',   type:'parent'},
  {s:'sally',   t:'mara-km',  type:'parent'},

// ── BUILD ─────────────────────────────────────────────────────────────────
(function(){
  const R = 11;

  // Assign pixel positions
  nodes.forEach(n => {
    n.x = XOFF + n.bx * SLOT;
    n.y = ROW_Y[n.row];
  });

  const byId = {};
  nodes.forEach(n => byId[n.id] = n);

  const linkData = links.map(l => ({
    source: byId[l.s], target: byId[l.t], type: l.type
  }));

  // Build traversal maps
  const childrenOf = {}; // parentId → [childNode]
  const parentsOf  = {}; // childId  → [parentNode]
  const spousesOf  = {}; // nodeId   → [spouseNode]
  linkData.forEach(l => {
    if (l.type === 'parent') {
      (childrenOf[l.source.id] = childrenOf[l.source.id]||[]).push(l.target);
      (parentsOf [l.target.id] = parentsOf [l.target.id]||[]).push(l.source);
    } else {
      (spousesOf[l.source.id] = spousesOf[l.source.id]||[]).push(l.target);
      (spousesOf[l.target.id] = spousesOf[l.target.id]||[]).push(l.source);
    }
  });

  // Full lineage: all ancestors (+ their spouses) + all descendants + own spouses + siblings
  function getLineage(d) {
    const set = new Set([d.id]);
    const addNode = (n) => { if (n && !set.has(n.id)) { set.add(n.id); return true; } return false; };

    // Ancestors (BFS up)
    const up = [d.id];
    while (up.length) {
      const nid = up.shift();
      (parentsOf[nid]||[]).forEach(p => {
        if (addNode(p)) {
          up.push(p.id);
          (spousesOf[p.id]||[]).forEach(s => addNode(s)); // parent's spouse
        }
      });
    }
    // Descendants (BFS down)
    const down = [d.id];
    while (down.length) {
      const nid = down.shift();
      (childrenOf[nid]||[]).forEach(c => {
        if (addNode(c)) {
          down.push(c.id);
          (spousesOf[c.id]||[]).forEach(s => addNode(s));
        }
      });
    }
    // Own spouses
    (spousesOf[d.id]||[]).forEach(s => addNode(s));
    // Siblings (share a parent)
    (parentsOf[d.id]||[]).forEach(p => {
      (childrenOf[p.id]||[]).forEach(sib => addNode(sib));
    });
    return set;
  }

  // ── SVG setup ──────────────────────────────────────────────────────────
  const svg = d3.select('#svg')
    .attr('width', SVG_W)
    .attr('height', SVG_H)
    .style('background', '#f8fafc');

  svg.on('click', reset);

  // ── Branch bands ───────────────────────────────────────────────────────
  const bands = [
    {label:'Dooley Branch  —  Grant\'s Direct Line',
     x1:0,                    x2:XOFF + 11*SLOT,
     fill:'#eff6ff', border:'#1d4ed8'},
    {label:"O'Connell Branch",
     x1:XOFF + 11*SLOT,       x2:XOFF + 21*SLOT,
     fill:'#eef2ff', border:'#3730a3'},
    {label:'McNamara Branch  —  Fairfield CT → Phoenix AZ',
     x1:XOFF + 21*SLOT,       x2:SVG_W,
     fill:'#fff7ed', border:'#c2410c'},
  ];
  bands.forEach(b => {
    svg.append('rect')
      .attr('x', b.x1).attr('y', 0)
      .attr('width', b.x2 - b.x1).attr('height', SVG_H)
      .attr('fill', b.fill);
    svg.append('line')
      .attr('x1', b.x1).attr('y1', 0)
      .attr('x2', b.x1).attr('y2', SVG_H)
      .attr('stroke', b.border)
      .attr('stroke-width', 1.5)
      .attr('opacity', 0.25);
    svg.append('text')
      .attr('x', (b.x1 + Math.min(b.x2, SVG_W)) / 2)
      .attr('y', 19)
      .attr('text-anchor','middle')
      .attr('font-size','10px')
      .attr('font-weight','700')
      .attr('font-family','system-ui,sans-serif')
      .attr('letter-spacing','.1em')
      .attr('fill', b.border)
      .attr('opacity', 0.5)
      .text(b.label.toUpperCase());
  });

  // ── Generation row bands ────────────────────────────────────────────────
  Object.entries(ROW_Y).forEach(([row, y]) => {
    svg.append('rect')
      .attr('x', 0).attr('y', y - 32)
      .attr('width', SVG_W).attr('height', 64)
      .attr('fill', 'rgba(255,255,255,0.55)');
    svg.append('text')
      .attr('x', 6).attr('y', y - 16)
      .attr('font-size','8px').attr('font-weight','700')
      .attr('font-family','system-ui,sans-serif')
      .attr('fill','#94a3b8')
      .attr('letter-spacing','.06em')
      .text(GEN_LABEL[+row].toUpperCase());
  });

  // ── Elbow connectors (parent links) ────────────────────────────────────
  // Group children by parent
  const elbows = [];
  Object.entries(childrenOf).forEach(([pid, children]) => {
    const parent = byId[pid];
    const childY = children[0].y;
    const midY   = parent.y + (childY - parent.y) * 0.5;

    const xs   = children.map(c => c.x);
    const minCX = Math.min(...xs);
    const maxCX = Math.max(...xs);
    // Bar must include the parent's x so stem connects
    const barMinX = Math.min(parent.x, minCX);
    const barMaxX = Math.max(parent.x, maxCX);

    // Stem: parent down to midY
    elbows.push({d:`M${parent.x},${parent.y + R + 1} V${midY}`,  pid, cid:null, b:parent.branch});
    // Horizontal bar
    elbows.push({d:`M${barMinX},${midY} H${barMaxX}`,             pid, cid:null, b:parent.branch});
    // Drops to each child
    children.forEach(c => {
      elbows.push({d:`M${c.x},${midY} V${c.y - R - 1}`,           pid, cid:c.id, b:parent.branch});
    });
  });

  const linkG = svg.append('g').attr('id','links');

  const elbowSel = linkG.selectAll('path.elbow')
    .data(elbows, d => d.pid + (d.cid||'-bar'))
    .join('path')
    .attr('class','elbow')
    .attr('d',    d => d.d)
    .attr('stroke', d => C[d.b].link)
    .attr('stroke-width', 1.6)
    .attr('fill','none')
    .attr('stroke-linecap','round')
    .attr('opacity', 0.4);

  // Spouse lines
  const spouseSel = linkG.selectAll('line.spouse')
    .data(linkData.filter(l => l.type === 'spouse'))
    .join('line')
    .attr('class','spouse')
    .attr('x1', d => Math.min(d.source.x, d.target.x) + R + 1)
    .attr('y1', d => d.source.y)
    .attr('x2', d => Math.max(d.source.x, d.target.x) - R - 1)
    .attr('y2', d => d.target.y)
    .attr('stroke','#94a3b8')
    .attr('stroke-width', 1.2)
    .attr('stroke-dasharray','4,4')
    .attr('opacity', 0.7);

  // ── Nodes ──────────────────────────────────────────────────────────────
  const nodeG   = svg.append('g').attr('id','nodes');
  const nodeSel = nodeG.selectAll('g')
    .data(nodes)
    .join('g')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor','pointer')
    .on('click', (e, d) => { e.stopPropagation(); focus(d); });

  nodeSel.append('circle')
    .attr('r', R)
    .attr('fill',   d => C[d.branch].fill)
    .attr('stroke', d => C[d.branch].stroke)
    .attr('stroke-width', 2);

  // Gold ring for Grant
  nodeSel.filter(d => d.id === 'grant')
    .append('circle')
    .attr('r', R + 5)
    .attr('fill','none')
    .attr('stroke','#f59e0b')
    .attr('stroke-width', 1.5)
    .attr('stroke-dasharray','3,3')
    .attr('opacity', 0.8);

  // Unknown warning ring
  nodeSel.filter(d => d.branch === 'unknown')
    .append('circle')
    .attr('r', R + 4)
    .attr('fill','none')
    .attr('stroke','#f59e0b')
    .attr('stroke-width', 1)
    .attr('stroke-dasharray','2,3')
    .attr('opacity', 0.5);

  nodeSel.append('text')
    .attr('y', R + 13)
    .attr('text-anchor','middle')
    .attr('font-size','9px')
    .attr('font-family','system-ui,sans-serif')
    .attr('fill', d => C[d.branch].text)
    .attr('font-weight','500')
    .text(d => d.name.length > 18 ? d.name.slice(0, 17) + '…' : d.name);

  // ── Legend (bottom-left corner) ────────────────────────────────────────
  const LEG = [
    ['dooley','Dooley Branch'],['kozak','Kozak'],['shomsky','Shomsky'],
    ['oconnell',"O'Connell Branch"],['mcnamara','McNamara Branch'],['unknown','Unknown / ⚠ Priority'],
  ];
  const legG = svg.append('g').attr('transform',`translate(6, ${SVG_H - 8 - LEG.length * 15})`);
  LEG.forEach(([b, label], i) => {
    legG.append('circle').attr('cx',6).attr('cy', i*15+5).attr('r',5)
      .attr('fill', C[b].fill).attr('stroke', C[b].stroke).attr('stroke-width', 1.5);
    legG.append('text').attr('x',16).attr('y', i*15+9)
      .attr('font-size','8.5px').attr('fill','#475569').attr('font-family','system-ui,sans-serif')
      .text(label);
  });

  // ── Focus / highlight ──────────────────────────────────────────────────
  function focus(d) {
    const line = getLineage(d);

    nodeSel.select('circle:first-of-type')
      .attr('r', n => n.id === d.id ? 17 : line.has(n.id) ? 13 : R)
      .attr('stroke-width', n => n.id === d.id ? 3 : 2)
      .attr('opacity', n => line.has(n.id) ? 1 : 0.12);
    nodeSel.select('text')
      .attr('font-size', n => n.id === d.id ? '11px' : '9px')
      .attr('opacity', n => line.has(n.id) ? 1 : 0.12)
      .attr('y', n => (n.id === d.id ? 17 : line.has(n.id) ? 13 : R) + 13);

    elbowSel
      .attr('opacity', p => {
        if (!p.cid) return line.has(p.pid) ? 0.7 : 0.04;
        return (line.has(p.pid) && line.has(p.cid)) ? 0.9 : 0.04;
      })
      .attr('stroke-width', p =>
        (p.cid ? line.has(p.pid) && line.has(p.cid) : line.has(p.pid)) ? 2.5 : 1.6
      );
    spouseSel
      .attr('opacity', l =>
        line.has(l.source.id) && line.has(l.target.id) ? 1 : 0.05
      );

    // Panel
    const genL    = GEN_LABEL[d.row];
    const branchL = {dooley:'Dooley Branch',kozak:'Kozak',shomsky:'Shomsky',
                     oconnell:"O'Connell Branch",mcnamara:'McNamara Branch',unknown:'Unknown / Unresolved'}[d.branch];
    document.getElementById('pname').textContent = d.name;
    const adj = new Set();
    linkData.forEach(l => {
      if (l.source.id === d.id) adj.add(l.target.id);
      if (l.target.id === d.id) adj.add(l.source.id);
    });
    document.getElementById('pbody').innerHTML =
      `<div class="prow"><span class="plbl">Branch</span>${branchL}</div>` +
      `<div class="prow"><span class="plbl">Gen</span>${genL}</div>` +
      (d.note ? `<div class="prow"><span class="plbl">Notes</span>${d.note}</div>` : '') +
      `<div class="pconn">${line.size - 1} relatives highlighted &nbsp;·&nbsp; ${adj.size} direct connections</div>`;
    document.getElementById('panel').style.display = 'block';
  }

  function reset() {
    nodeSel.select('circle:first-of-type').attr('r', R).attr('stroke-width', 2).attr('opacity', 1);
    nodeSel.select('text').attr('font-size','9px').attr('opacity', 1).attr('y', R + 13);
    elbowSel.attr('opacity', 0.4).attr('stroke-width', 1.6);
    spouseSel.attr('opacity', 0.7);
    document.getElementById('panel').style.display = 'none';
  }

  document.getElementById('pclose').onclick = reset;
  document.addEventListener('keydown', e => { if (e.key === 'Escape') reset(); });
})();
</script>
</body>
</html>
