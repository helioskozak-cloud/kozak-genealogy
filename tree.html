var BW=214,BH=54,HGAP=62;
function genOf(k){return Math.floor(Math.log2(k));}
function rowOf(k){return k-Math.pow(2,genOf(k));}
function ngOf(persons){return Math.floor(Math.log2(Math.max.apply(null,Object.keys(persons).map(Number))))+1;}
function chOf(ng){return 160*Math.pow(2,ng-1);}
function cwOf(ng){return (ng-1)*(BW+HGAP)+BW+32;}
function yOf(k,CH){return (2*rowOf(k)+1)*CH/(2*Math.pow(2,genOf(k)));}
function xOf(k,ng){return (ng-1-genOf(k))*(BW+HGAP);}
function trunc(s,n){return s.length>n?s.slice(0,n-1)+'…':s;}

var CB_KEY='kozak-confirmations';
function cbGet(){return JSON.parse(localStorage.getItem(CB_KEY)||'{}');}
function cbSet(id,st){
  var s=cbGet(); s[id]={status:st,saved:new Date().toISOString().slice(0,10)};
  localStorage.setItem(CB_KEY,JSON.stringify(s)); renderCbar(id);
}
function cbNote(id,val){
  var s=cbGet(); if(!s[id])s[id]={status:'denied',saved:new Date().toISOString().slice(0,10)};
  s[id].note=val; localStorage.setItem(CB_KEY,JSON.stringify(s));
}
function renderCbar(id){
  var e=cbGet()[id]||{}; var st=e.status||'';
  var bar=document.getElementById('cbar-'+id); if(!bar)return;
  bar.querySelectorAll('.cbar-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.v===st);
  });
  var sv=document.getElementById('cbsaved-'+id);
  if(sv)sv.textContent=e.note?'Saved: "'+e.note+'"':(st?'Saved '+e.saved:'');
  var inp=document.getElementById('cbinp-'+id);
  if(inp){inp.style.display=st==='denied'?'':'none';}
}
document.addEventListener('DOMContentLoaded',function(){
  var s=cbGet(); Object.keys(s).forEach(function(id){renderCbar(id);});
});

// ═══════════════════════════════════════════════════════════════
//  DETAIL PANEL
// ═══════════════════════════════════════════════════════════════
function showPanel(person){
  document.getElementById('pn').textContent=person.name;
  document.getElementById('pr').textContent=person.relation+(person.prob?' ⚠ Probable':'');
  var html='';
  (person.facts||[]).forEach(function(f){
    html+='<div class="prow"><span class="plbl">'+f[0]+'</span><span>'+f[1]+'</span></div>';
  });
  if(person.confirm){
    var c=person.confirm; var e=cbGet()[c.id]||{}; var st=e.status||'';
    html+='<div class="cbar" id="cbar-'+c.id+'">'
      +'<div class="cbar-q">'+c.q+'</div>'
      +'<div class="cbar-btns">'
      +'<button class="cbar-btn cbar-btn-y'+(st==='confirmed'?' active':'')+'" data-v="confirmed" onclick="cbSet(\''+c.id+'\',\'confirmed\')">✓ Confirmed</button>'
      +'<button class="cbar-btn cbar-btn-u'+(st==='unknown'?' active':'')+'" data-v="unknown" onclick="cbSet(\''+c.id+'\',\'unknown\')">? Unknown</button>'
      +'<button class="cbar-btn cbar-btn-n'+(st==='denied'?' active':'')+'" data-v="denied" onclick="cbSet(\''+c.id+'\',\'denied\')">✗ Wrong</button>'
      +'</div>'
      +'<input class="cbar-input" id="cbinp-'+c.id+'" style="display:'+(st==='denied'?'':'none')+'" placeholder="Enter correct dates…" oninput="cbNote(\''+c.id+'\',this.value)"'+(e.note?' value="'+e.note+'"':'')+'>'
      +'<div class="cbar-saved" id="cbsaved-'+c.id+'">'+(e.note?'Saved: "'+e.note+'"':(st?'Saved '+e.saved:''))+'</div>'
      +'</div>';
  }
  document.getElementById('pb').innerHTML=html;
  document.getElementById('panel').style.display='block';
}
document.getElementById('px').onclick=function(){document.getElementById('panel').style.display='none';};

// ═══════════════════════════════════════════════════════════════
//  BRANCH REORDER / COLLAPSE
// ═══════════════════════════════════════════════════════════════
function moveBranch(id,dir){
  var wrap=document.getElementById('branches');
  var el=document.getElementById('b-'+id);
  if(dir===-1){var p=el.previousElementSibling;if(p)wrap.insertBefore(el,p);}
  else{var n=el.nextElementSibling;if(n)wrap.insertBefore(n,el);}
}
function collapseBranch(id){
  var body=document.getElementById('bb-'+id);
  var btn=document.getElementById('bcoll-'+id);
  var c=body.style.display==='none';
  body.style.display=c?'':'none';
  btn.textContent=c?'Collapse ▲':'Expand ▼';
}

// ═══════════════════════════════════════════════════════════════
//  DRAW ONE BRANCH
// ═══════════════════════════════════════════════════════════════
var ZOOMS={};
function drawBranch(branch){
  var persons=branch.persons;
  var ng=ngOf(persons);
  var CH=chOf(ng),CW=cwOf(ng);
  var svgEl=document.getElementById('svg-'+branch.id);
  svgEl.style.height=(CH+72)+'px';

  var svg=d3.select('#svg-'+branch.id);
  var SC=svg.append('g');
  var zoom=d3.zoom().scaleExtent([0.10,5])
    .on('zoom',function(e){SC.attr('transform',e.transform);});
  svg.call(zoom);
  ZOOMS[branch.id]=zoom;

  // Gen labels
  var gLbls=['Focal Person','Parents','Grandparents','Great-Grandparents','Gt-Gt-Grandparents'];
  for(var g=0;g<ng;g++){
    var gx=xOf(Math.pow(2,g),ng)+BW/2;
    SC.append('text').attr('x',gx).attr('y',16)
      .attr('text-anchor','middle').attr('font-size',8).attr('font-weight',700)
      .attr('fill','#94a3b8').attr('letter-spacing','0.09em').attr('font-family','system-ui,sans-serif')
      .text(gLbls[g]||'');
  }

  // Connectors
  var lg=SC.append('g');
  var maxSlot=Math.pow(2,ng)-1;
  for(var k=1;k<=maxSlot;k++){
    if(!persons[k])continue;
    var ms=2*k,ps=2*k+1,haM=!!persons[ms],haP=!!persons[ps];
    if(!haM&&!haP)continue;
    var cx=xOf(k,ng),cy=yOf(k,CH),vx=cx-HGAP/2;
    lg.append('line').attr('x1',cx).attr('y1',cy).attr('x2',vx).attr('y2',cy)
      .attr('stroke','#cbd5e1').attr('stroke-width',1.5);
    if(haM){
      var my=yOf(ms,CH),mxr=xOf(ms,ng)+BW;
      lg.append('line').attr('x1',mxr).attr('y1',my).attr('x2',vx).attr('y2',my)
        .attr('stroke','#cbd5e1').attr('stroke-width',1.5);
      lg.append('line').attr('x1',vx).attr('y1',my).attr('x2',vx).attr('y2',haP?yOf(ps,CH):cy)
        .attr('stroke','#cbd5e1').attr('stroke-width',1.5);
    }
    if(haP){
      var py=yOf(ps,CH),pxr=xOf(ps,ng)+BW;
      lg.append('line').attr('x1',pxr).attr('y1',py).attr('x2',vx).attr('y2',py)
        .attr('stroke','#cbd5e1').attr('stroke-width',1.5);
      if(!haM)lg.append('line').attr('x1',vx).attr('y1',cy).attr('x2',vx).attr('y2',py)
        .attr('stroke','#cbd5e1').attr('stroke-width',1.5);
    }
  }

  // Boxes
  var bg=SC.append('g');
  Object.keys(persons).forEach(function(ks){
    var k=+ks,person=persons[k];
    var c=nodeClr(person);
    var bx=xOf(k,ng),by=yOf(k,CH)-BH/2;
    var g=bg.append('g').style('cursor','pointer')
      .on('click',function(){showPanel(person);});
    g.append('rect').attr('x',bx).attr('y',by).attr('width',BW).attr('height',BH)
      .attr('rx',5).attr('fill',c.fill).attr('stroke',c.stroke).attr('stroke-width',1.8)
      .attr('stroke-dasharray',person.prob?'5,3':null);
    var nm=person.name,parts=nm.split(' ');
    var mid=Math.ceil(parts.length/2);
    var l1=parts.slice(0,mid).join(' '),l2=parts.slice(mid).join(' ');
    if(l2){
      g.append('text').attr('x',bx+BW/2).attr('y',by+BH/2-5)
        .attr('text-anchor','middle').attr('fill',c.text)
        .attr('font-family','system-ui,sans-serif').attr('font-size',10).attr('font-weight',700)
        .text(trunc(l1,23));
      g.append('text').attr('x',bx+BW/2).attr('y',by+BH/2+9)
        .attr('text-anchor','middle').attr('fill',c.text)
        .attr('font-family','system-ui,sans-serif').attr('font-size',10).attr('font-weight',700)
        .text(trunc(l2,23));
    } else {
      g.append('text').attr('x',bx+BW/2).attr('y',by+BH/2+4)
        .attr('text-anchor','middle').attr('fill',c.text)
        .attr('font-family','system-ui,sans-serif').attr('font-size',11).attr('font-weight',700)
        .text(trunc(nm,24));
    }
    if(person.note){
      g.append('text').attr('x',bx+BW/2).attr('y',by+BH-6)
        .attr('text-anchor','middle').attr('fill',c.text)
        .attr('font-family','system-ui,sans-serif').attr('font-size',7.5).attr('opacity',0.72)
        .text(trunc(person.note,34));
    }
    if(person.prob){
      g.append('circle').attr('cx',bx+BW-7).attr('cy',by+7).attr('r',3.5).attr('fill','#d97706');
    }
  });

  // Fit to full width of SVG
  requestAnimationFrame(function(){
    var r=svgEl.getBoundingClientRect();
    var W=r.width||window.innerWidth,H=r.height||(CH+56);
    var s=(W-20)/(CW)*0.97;
    var ty=Math.max(24,(H-CH*s)/2);
    svg.call(zoom.transform,d3.zoomIdentity.translate(10,ty).scale(s));
  });
}

// ═══════════════════════════════════════════════════════════════
//  BUILD & RENDER ALL BRANCHES
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
//  FAMILY BLOCK (siblings / children section below SVG)
// ═══════════════════════════════════════════════════════════════
var CHILD_CLR={
  kozak:{bg:'#dcfce7',bd:'#15803d',fg:'#14532d'},
  rel:  {bg:'#f3e8ff',bd:'#7e22ce',fg:'#3b0764'},
  shom: {bg:'#e0f2fe',bd:'#0369a1',fg:'#0c4a6e'},
  mcg:  {bg:'#fce7f3',bd:'#be185d',fg:'#831843'},
  other:{bg:'#f1f5f9',bd:'#94a3b8',fg:'#475569'},
  gray: {bg:'#f8fafc',bd:'#cbd5e1',fg:'#94a3b8'}
};
function buildFamilyBlock(branch){
  if(!branch.family) return '';
  var f=branch.family;
  var rows='';
  f.children.forEach(function(ch){
    var c=CHILD_CLR[ch.branch]||CHILD_CLR.other;
    var bd=ch.prob?'1.5px dashed '+c.bd:'1.5px solid '+c.bd;
    var star=ch.focal?'<span style="font-size:.64rem;background:#fef9c3;color:#92400e;padding:1px 4px;border-radius:3px;margin-left:4px;font-weight:700">focal</span>':'';
    var prob=ch.prob?'<span style="font-size:.64rem;background:#fff7ed;color:#d97706;padding:1px 4px;border-radius:3px;margin-left:4px">prob.</span>':'';
    rows+='<div class="fam-child">'
      +'<div class="fam-child-h"></div>'
      +'<div class="fam-child-box" style="background:'+c.bg+';border:'+bd+';color:'+c.fg+'">'+ch.name+star+prob+'</div>'
      +(ch.note?'<span class="fam-child-note">'+ch.note+'</span>':'')
      +'</div>';
  });
  return '<div class="fam-block">'
    +'<div class="fam-hdr">'+f.heading+'</div>'
    +'<div class="fam-connector">'
      +'<div class="fam-parents">'
        +(branch.persons[3]?'<div class="fam-parent">'+branch.persons[3].name+'</div>':'')
        +(branch.persons[2]?'<div class="fam-parent">'+branch.persons[2].name+'</div>':'')
      +'</div>'
      +'<div class="fam-line-h"></div>'
      +'<div class="fam-line-v">'+rows+'</div>'
    +'</div>'
    +(f.note?'<div class="fam-note">'+f.note+'</div>':'')
    +'</div>';
}

var container=document.getElementById('branches');
BRANCHES.forEach(function(branch){
  var div=document.createElement('div');
  div.className='branch'+(branch.id==='bjm'?' branch-target':''); div.id='b-'+branch.id;
  var targetBanner=branch.id==='bjm'
    ? '<div style="background:#fef2f2;border:1.5px solid #dc2626;border-radius:6px;padding:5px 10px;font-size:.71rem;font-weight:700;color:#991b1b;margin-top:7px;display:inline-block">⚠ NO PROVEN BRIDGE to any Relihan branch — this is the research target, not a confirmed relative</div>'
    : '';
  div.innerHTML=
    '<div class="bh" style="border-color:'+branch.color+'">'
      +'<div class="bh-left">'
        +'<div class="bh-name" style="color:'+branch.color+'">'+branch.name+'</div>'
        +'<div class="bh-note">'+branch.note+'</div>'
        +targetBanner
      +'</div>'
      +'<div class="bh-btns">'
        +'<button class="bb" onclick="moveBranch(\''+branch.id+'\',-1)">↑</button>'
        +'<button class="bb" onclick="moveBranch(\''+branch.id+'\',1)">↓</button>'
        +'<button class="bb" id="bcoll-'+branch.id+'" onclick="collapseBranch(\''+branch.id+'\')">Collapse ▲</button>'
      +'</div>'
    +'</div>'
    +'<div class="branch-body" id="bb-'+branch.id+'">'
      +'<svg id="svg-'+branch.id+'" class="bsvg"></svg>'
      +buildFamilyBlock(branch)
    +'</div>';
  container.appendChild(div);
  drawBranch(branch);
});
</script>
